name: Build Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # MediaPipe and vgamepad work well with 3.11

    - name: Install dependencies
      env:
        VGAMEPAD_SKIP_VIGEMBUS_INSTALL: 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --hidden-import=vgamepad --hidden-import=mediapipe main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Steer_it-Windows-Executable
        path: dist/main.exe
