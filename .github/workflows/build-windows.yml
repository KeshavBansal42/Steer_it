name: Build Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # MediaPipe and vgamepad work well with 3.11

    - name: Install dependencies
      env:
        VGAMEPAD_SKIP_VIGEMBUS_INSTALL: 'true'
      run: |
        python -m pip install --upgrade pip
        
        # Temporarily remove vgamepad from requirements safely (FIXED LINE)
        (Get-Content requirements.txt) -notmatch 'vgamepad' | Out-File -Encoding utf8 req_tmp.txt
        pip install -r req_tmp.txt
        
        # Clone, patch, and install vgamepad to bypass the registry query freeze
        git clone https://github.com/yannbouteiller/vgamepad.git
        python -c "import os; content = open('vgamepad/setup.py').read().replace('subprocess.check_output', '(lambda *a, **kw: \"\")'); open('vgamepad/setup.py', 'w').write(content)"
        pip install ./vgamepad
        
        pip install pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --hidden-import=cv2 --collect-all mediapipe --collect-all vgamepad main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Steer_it-Windows-Executable
        path: dist/main.exe
